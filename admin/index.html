<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Painel Administrativo — Ana Luisa Santos</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script>
      // Check for invite/recovery tokens in URL
      if (window.location.href.includes('#invite_token') || window.location.href.includes('#recovery_token')) {
        window.netlifyIdentity.on('open', () => {
          window.netlifyIdentity.close();
          window.netlifyIdentity.open(window.location.href.includes('#invite_token') ? 'signup' : 'login');
        });
      }

      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.open();
        } else {
          window.location.href = '/admin/#/';
        }
      });

      window.netlifyIdentity.on('login', () => {
        window.location.href = '/admin/#/';
      });

      window.netlifyIdentity.init();
    </script>
  </body>
</html>
